<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kartu Ucapan - Ko Matthew</title>  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#1e3c72,#2a5298);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .card {
      width:90%;
      max-width:650px;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(15px);
      border-radius:20px;
      padding:35px;
      color:white;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    h1 { font-size:20px; opacity:0.8; }

    h2 {
      font-family:'Playfair Display',serif;
      font-size:28px;
      color:#ffd369;
      margin-bottom:20px;
    }

    #message {
      text-align:justify;
      font-size:15px;
      line-height:1.8;
      white-space:pre-line;
      min-height:220px;
    }

    .btn {
      margin-top:25px;
      padding:12px 28px;
      border:none;
      border-radius:30px;
      background:linear-gradient(45deg,#ffd369,#ffb347);
      color:#333;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover { transform:scale(1.08); }

    .hidden { display:none; }

    .from {
      margin-top:20px;
      color:#ffd369;
      font-weight:600;
    }

    .signature { font-weight:bold; }

  </style></head>
<body>
  <div class="card">
    <div id="menu">
      <h1>Kepada:</h1>
      <h2>Ko Matthew</h2>
      <button class="btn" onclick="openCard()">Buka Ucapan</button>
    </div><div id="content" class="hidden">
  <div id="message"></div>

  <div class="from hidden" id="fromSection">
    From:
    <div class="signature">Stevan William Christharyanto<br/>Kelas 12 PKBM PINUS</div>
  </div>

  <button class="btn" onclick="goBack()">← Kembali</button>
</div>

  </div>  <script>
    const text = `Terima kasih Ko Matthew, sudah menjadi pembimbing mentor aku selama 1-3 bulan kemarin koo, thank you atas ilmu dan motivasi yang telah diberikan.\n\nMulai dari pembagian 4 kuadran mengenai tugas yang penting dan mendesak, pengaturan keuangan, apa yang perlu dilakukan ketika wawancara kerja, dan masih banyak lagi.\n\nTerima kasih juga telah mendukung, memberi motivasi dan mau mendengarkan setiap cerita yang pernah kusampaikan.\n\nKiranya mentoring / program yang telah berjalan ini bisa terus berlanjut kedepannya untuk adik-adik kelas lainnya.\n\nThank you ko Mat, sehat selalu, sukses selalu dalam setiap pekerjaan yang dilakukan, Tuhan berkati selalu dalam segala hal...`;

    let index = 0;
    let typingInterval;

    function typeWriter() {
      const msg = document.getElementById('message');
      msg.innerHTML = "";
      index = 0;

      typingInterval = setInterval(() => {
        if (index < text.length) {
          msg.innerHTML += text.charAt(index);
          index++;
        } else {
          clearInterval(typingInterval);
          document.getElementById('fromSection').classList.remove('hidden');
        }
      }, 20);
    }

    function openCard() {
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
      document.getElementById('fromSection').classList.add('hidden');
      typeWriter();
    }

    function goBack() {
      clearInterval(typingInterval);
      document.getElementById('content').classList.add('hidden');
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('message').innerHTML = "";
    }
  </script></body>
</html>
